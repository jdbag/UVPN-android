name: Build U VPN APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle wrapper files
        run: |
          mkdir -p gradle/wrapper

          # 1. Download gradle-wrapper.jar
          curl -sL \
            "https://github.com/gradle/gradle/raw/v8.6.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

          # 2. Write gradle-wrapper.properties (always overwrite to be safe)
          printf 'distributionBase=GRADLE_USER_HOME\ndistributionPath=wrapper/dists\ndistributionUrl=https\\://services.gradle.org/distributions/gradle-8.6-bin.zip\nnetworkTimeout=10000\nzipStoreBase=GRADLE_USER_HOME\nzipStorePath=wrapper/dists\n' \
            > gradle/wrapper/gradle-wrapper.properties

          # 3. Write gradle.properties with AndroidX enabled
          printf 'org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8\norg.gradle.daemon=false\nandroid.useAndroidX=true\nandroid.enableJetifier=false\nkotlin.code.style=official\n' \
            > gradle.properties

          echo "=== gradle-wrapper.properties ===" && cat gradle/wrapper/gradle-wrapper.properties
          echo "=== gradle.properties ===" && cat gradle.properties

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: gradle-

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: UVPN-debug-${{ github.run_number }}.apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Show APK
        if: success()
        run: ls -lh app/build/outputs/apk/debug/app-debug.apk
