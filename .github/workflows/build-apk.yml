name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Install tools
        run: sudo apt-get install -y imagemagick librsvg2-bin

      - name: Prepare www folder
        run: |
          mkdir -p www
          for f in index.html style.css app.js logo.svg manifest.json sw.js; do
            [ -f "$f" ] && cp "$f" www/ || true
          done
          [ -d "icons" ] && cp -r icons www/ || true

      - name: Install Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Init Capacitor
        run: |
          npx cap init "U VPN" "com.uvpn.app" --web-dir "www"

      - name: Add Android platform
        run: npx cap add android

      - name: Copy web assets
        run: npx cap copy android

      - name: Create launcher icons from logo.svg
        run: |
          SIZES=("36" "48" "72" "96" "144" "192")
          DIRS=("ldpi" "mdpi" "hdpi" "xhdpi" "xxhdpi" "xxxhdpi")
          for i in "${!SIZES[@]}"; do
            SIZE="${SIZES[$i]}"
            DIR="android/app/src/main/res/mipmap-${DIRS[$i]}"
            mkdir -p "$DIR"
            if [ -f "logo.svg" ]; then
              rsvg-convert -w "$SIZE" -h "$SIZE" logo.svg > "$DIR/ic_launcher.png" 2>/dev/null || \
              convert -background none -resize "${SIZE}x${SIZE}" logo.svg "$DIR/ic_launcher.png" 2>/dev/null || \
              convert -size "${SIZE}x${SIZE}" xc:"#0d1b2a" "$DIR/ic_launcher.png"
            else
              convert -size "${SIZE}x${SIZE}" xc:"#0d1b2a" "$DIR/ic_launcher.png"
            fi
            cp "$DIR/ic_launcher.png" "$DIR/ic_launcher_round.png"
          done

      - name: Grant gradlew permission
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: U-VPN-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
