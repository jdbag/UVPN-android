name: Build U VPN APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle wrapper
        run: |
          mkdir -p gradle/wrapper

          # Download jar
          curl -sL \
            "https://github.com/gradle/gradle/raw/v8.6.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

          # Write properties file — MUST have distributionUrl
          cat > gradle/wrapper/gradle-wrapper.properties << 'PROPS'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.6-bin.zip
          networkTimeout=10000
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          PROPS

          # Remove leading spaces from heredoc
          sed -i 's/^          //' gradle/wrapper/gradle-wrapper.properties

          echo "=== gradle-wrapper.properties ==="
          cat gradle/wrapper/gradle-wrapper.properties
          echo "=== jar size ==="
          ls -lh gradle/wrapper/gradle-wrapper.jar

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: UVPN-debug-${{ github.run_number }}.apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build info
        if: success()
        run: ls -lh app/build/outputs/apk/debug/app-debug.apk
