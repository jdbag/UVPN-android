name: Build U VPN APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Setup Gradle
        run: |
          mkdir -p gradle/wrapper
          curl -sL "https://github.com/gradle/gradle/raw/v8.6.0/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar
          printf 'distributionBase=GRADLE_USER_HOME\ndistributionPath=wrapper/dists\ndistributionUrl=https\://services.gradle.org/distributions/gradle-8.6-bin.zip\nzipStoreBase=GRADLE_USER_HOME\nzipStorePath=wrapper/dists\n' > gradle/wrapper/gradle-wrapper.properties
          printf 'org.gradle.jvmargs=-Xmx2048m\norg.gradle.daemon=false\nandroid.useAndroidX=true\nandroid.enableJetifier=false\n' > gradle.properties

      - name: Fix VPN internet cut
        run: |
          VPN=app/src/main/java/com/uvpn/app/vpn/WarpVpnService.kt
          if grep -q "addRoute.*0.0.0.0.*0\b" "$VPN"; then
            sed -i 's/.addRoute("0.0.0.0", 0)/.addRoute("0.0.0.0", 1)\n                .addRoute("128.0.0.0", 1)/' "$VPN"
            echo "Route fixed"
          fi
          if ! grep -q "protect(sock" "$VPN"; then
            sed -i 's/val tun = Builder()/val socket = DatagramSocket()\n            protect(socket)\n            socket.connect(java.net.InetSocketAddress(WARP_HOST, WARP_PORT))\n            socket.soTimeout = 10_000\n            udpSocket = socket\n            val tun = Builder()/' "$VPN"
            echo "Protect fixed"
          fi
          grep -n "128.0.0\|protect(sock" "$VPN" || echo "Check manually"

      - name: Build APK
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: UVPN-debug-${{ github.run_number }}.apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          
