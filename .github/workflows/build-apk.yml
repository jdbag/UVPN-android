name: Build U VPN APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Setup Gradle
        run: |
          mkdir -p gradle/wrapper
          curl -sL "https://github.com/gradle/gradle/raw/v8.6.0/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar
          printf 'distributionBase=GRADLE_USER_HOME\ndistributionPath=wrapper/dists\ndistributionUrl=https\\://services.gradle.org/distributions/gradle-8.6-bin.zip\nzipStoreBase=GRADLE_USER_HOME\nzipStorePath=wrapper/dists\n' > gradle/wrapper/gradle-wrapper.properties
          printf 'org.gradle.jvmargs=-Xmx2048m\norg.gradle.daemon=false\nandroid.useAndroidX=true\nandroid.enableJetifier=false\n' > gradle.properties

      - name: Fix icons
        run: |
          python3 << 'EOF'
          import base64, os, io
          from PIL import Image
          b64 = ""
          img = Image.open(io.BytesIO(base64.b64decode(b64))).convert('RGBA')
          for d, sz in {'mipmap-ldpi':36,'mipmap-mdpi':48,'mipmap-hdpi':72,'mipmap-xhdpi':96,'mipmap-xxhdpi':144,'mipmap-xxxhdpi':192}.items():
              p = f'app/src/main/res/{d}'
              os.makedirs(p, exist_ok=True)
              r = img.resize((sz,sz), Image.LANCZOS)
              r.save(f'{p}/ic_launcher.png')
              r.save(f'{p}/ic_launcher_round.png')
              print(f'OK {d}')
          import shutil
          for x in ['app/src/main/res/mipmap-anydpi-v26']:
              if os.path.exists(x): shutil.rmtree(x); print(f'DELETED {x}')
          for x in ['app/src/main/res/drawable/ic_launcher_foreground.xml']:
              if os.path.exists(x): os.remove(x); print(f'DELETED {x}')
          print('Icons done')
          EOF

      - name: Grant gradlew
        run: chmod +x gradlew

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: gradle-

      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: UVPN-debug-${{ github.run_number }}.apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
